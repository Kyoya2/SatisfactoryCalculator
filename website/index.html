<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Satisfactory Calculator</title>

        <!-- favicon stuff -->
        <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
        <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
        <link rel="manifest" href="favicon/site.webmanifest">

        <link rel="stylesheet" href="style.css">
        <link href="https://cdn.jsdelivr.net/npm/tom-select@2.5.1/dist/css/tom-select.css" rel="stylesheet">
    </head>

    <body>
        <!-- This apparently fixes a bug that happens in firefox: https://stackoverflow.com/questions/21147149/flash-of-unstyled-content-fouc-in-firefox-only-is-ff-slow-renderer -->
        <script>0</script>

        <div id="app">
            <div id="sidebar">
                <h3>Configuration</h3>

                <label for="craftableItemSelect">Item to craft:</label>
                <select id="craftableItemSelect"></select><br>

                <hr>

                <!-------------------------------------------------------------------->

                <label>Additional Options:</label>
                <br/>

                <label for="displayMultiplierInput">Multiplier: </label>
                <input type="text" id="displayMultiplierInput" size="3">
                <button type="button" id="updateDisplayMultiplier">Update</button>
                <button type="button" id="updateDisplayMultiplierAuto" title="Calculate the optimal multiplier">Auto</button>
                <br/>

                <input type="checkbox" id="showByproductsCheckbox" switch>
                <label for="showByproductsCheckbox">Show byproducts</label>
                <br/>

                <button type="button" id="resetAlternateRecipesButton">Reset alternate recipes</button>

                <footer style="position: fixed; bottom: 10px; right: 10px; z-index: 9999;">
                    <a href="https://github.com/Kyoya2/SatisfactoryCalculator">
                      Kyoya2/SatisfactoryCalculator on GitHub
                    </a>
                </footer>
            </div>

            <div id="panzoomGraphContainer">
                <div id="graphContainer"></div>
            </div>
        </div>

        <template id="nodeOverlayTemplate"><div class="node-overlay">
            <label class="node-item-name"></label>
            <img class="node-icon"/>
            <br/><br/>

            <div class="node-alternate-recipes">
                <label class="recipe-label">Recipe:&nbsp;</label>
                <select class="panzoom-clickable"></select><br>
            </div>

            <label>Production:&nbsp;</label><label class="production-rate-label editable-multiplier-label panzoom-clickable"></label><label>/m</label><br/>

            <div class="machines-required-container">
                <label>Machines required:</label>
                <label class="machines-required-label editable-multiplier-label panzoom-clickable"></label>
                <br/>
            </div>

            <div class="is-trivial-container">
                <label>Trivial?</label>
                <input type="checkbox" class="is-trivial-checkbox panzoom-clickable" switch>
            </div>
        </div></template>

        <template id="edgeOverlayTemplate"><div class="edge-overlay">
            <label class="edge-ratio-label"></label>
            <br/>
            <label class="edge-production-label editable-multiplier-label panzoom-clickable"></label><label>/m</label>
        </div></template>

        <script type="module">import "@/Main.mjs";</script>
    </body>
</html>
