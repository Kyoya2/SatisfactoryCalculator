<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Satisfactory App</title>

        <!-- Must be before including cytoscape JS files-->
        <link rel="stylesheet" href="style.css">

        <!-- TODO: change "cytoscape.umd.js" to "cytoscape.min.js" on prod-->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.33.1/cytoscape.umd.js" integrity="sha512-PWDVOsEbuBhFzLU0vHkNCxLOH0ksW/h/AhnFSI01BimUIHvEU6HYh9ngZmZlaEtd2+p2MMUQLismQ/WkapssTw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

        <link href="https://cdn.jsdelivr.net/npm/tom-select@2.5.1/dist/css/tom-select.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/tom-select@2.5.1/dist/js/tom-select.complete.min.js"></script>
    </head>

    <body style="overflow:hidden">
        <!-- This apparently fixes a bug that happens in firefox: https://stackoverflow.com/questions/21147149/flash-of-unstyled-content-fouc-in-firefox-only-is-ff-slow-renderer -->
        <script>0</script>

        <div id="sidebar" style="width:29%; float:left">
            <h3>Item</h3>

            <label for="craftableItemSelect">Object: </label>
            <select id="craftableItemSelect"></select><br>

            <hr>

            <label>Additional Options:</label><br>
            
            <input type="checkbox" id="useAletnateRecipes">
            <label for="useAletnateRecipes"> Use alternate recipes</label><br>

            <label for="logisticsTierSelect">Logistics Tier:</label>
            <select id="logisticsTierSelect">
                <!-- TODO: Generate this automatically (available in game data, under "mSpeed" property)-->
                <option value="60">Mk.1</option>
                <option value="120">Mk.2</option>
                <option value="270">Mk.3</option>
                <option value="480">Mk.4</option>
                <option value="780">Mk.5</option>
                <option value="1200">Mk.6</option>
            </select><br>

        </div>

        <div id="graph" style="float:right"></div>
            
        <script src="scripts/script.js" type="module"></script>
    </body>
</html>
