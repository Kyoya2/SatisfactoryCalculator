<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Satisfactory Calculator</title>

        <!-- Must be before including cytoscape JS files-->
        <link rel="stylesheet" href="style.css">

        <link href="https://cdn.jsdelivr.net/npm/tom-select@2.5.1/dist/css/tom-select.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/tom-select@2.5.1/dist/js/tom-select.complete.min.js"></script>
    </head>

    <body>
        <!-- This apparently fixes a bug that happens in firefox: https://stackoverflow.com/questions/21147149/flash-of-unstyled-content-fouc-in-firefox-only-is-ff-slow-renderer -->
        <script>0</script>

        <div id="app">
            <div id="sidebar">
                <h3>Configuration</h3>

                <label for="craftableItemSelect">Item to craft:</label>
                <select id="craftableItemSelect"></select><br>

                <hr>

                <!-------------------------------------------------------------------->

                <label>Trivial resources</label>
                <input type="text" id="trivialResourceSearch" placeholder="Search..." style="float:right"><br/><br/>
                <div id="trivialResourcesTableContainer">
                    <table id="trivialResourcesTable">
                        <thead>
                            <tr>
                                <th>Resource name</th>
                                <th>Prod/m</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div><br>

                <button type="button" id="updateTrivialResourcesButton">Update</button>
                <hr>

                <!-------------------------------------------------------------------->

                <label>Additional Options:</label>
                <br/>

                <label for="displayMultiplierInput">Multiplier: </label>
                <input type="text" id="displayMultiplierInput" size="3">
                <button type="button" id="updateDisplayMultiplier">Update</button>
                <button type="button" id="updateDisplayMultiplierAuto" title="Calculate the optimal multiplier">Auto</button>
                <br/>


                <input type="checkbox" id="useAletnateRecipes">
                <label for="useAletnateRecipes"> Use alternate recipes </label>
                <br/>

                <label for="unlockedConveyorBeltSelect">Unlocked Conveyor Belt: </label>
                <select id="unlockedConveyorBeltSelect"></select>
                <br/>

                <label for="unlockedPipelineSelect">Unlocked Pipeline: </label>
                <select id="unlockedPipelineSelect"></select>
                <br/>

                <label for="maxPowerShardsSelect">Max Power Shards: </label>
                <select id="maxPowerShardsSelect">
                    <option selected="true">0</option>
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                </select>
                <br/>

                <button type="button" id="resetAlternateRecipesButton">Reset alternate recipes</button>

                <footer style="position: fixed; bottom: 10px; right: 10px; z-index: 9999;">
                    <a href="https://github.com/Kyoya2/SatisfactoryCalculator">
                      Kyoya2/SatisfactoryCalculator on GitHub
                    </a>
                </footer>
            </div>

            <div id="graphContainer" class="mermaid" style="float:right; overflow:auto"></div>
        </div>

        <template id="nodeOverlayTemplate"><div class="node-overlay">
            <label class="node-item-name editable-label"></label>
            <img class="node-icon"/>
            <br/><br/>

            <div class="node-alternate-recipes">
                <label class="recipe-label">Recipe:&nbsp;</label>
                <select></select><br>
            </div>

            <label>Production:&nbsp;</label><label class="production-rate-label editable-label"></label><br/>
            <label>Machines required:&nbsp;</label><label class="machines-required-label editable-label"></label><br/>
        </div></template>

        <template id="edgeOverlayTemplate"><div class="edge-overlay">
            <label class="edge-ratio-label editable-label"></label>
            <br/>
            <label class="edge-production-label editable-label"></label>
        </div></template>
            
        <script src="scripts/Main.mjs" type="module"></script>
    </body>
</html>
